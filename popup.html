<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 14px; background: #0f172a; color: #f8fafc; margin: 0; }
    .header-panel { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .title { margin: 0; font-size: 15px; font-weight: 700; color: #38bdf8; letter-spacing: 0.3px; }
    .badge { padding: 3px 8px; font-size: 10px; font-weight: 700; border-radius: 20px; text-transform: uppercase; }
    .badge.study { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.4); }
    .badge.normal { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.4); }
    .card { background: #1e293b; border-radius: 10px; padding: 12px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #334155; }
    .label { font-size: 10px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { font-size: 24px; font-weight: 800; margin: 4px 0 10px 0; font-variant-numeric: tabular-nums; }
    .red-t { color: #f87171; }
    .green-t { color: #34d399; }
    button { width: 100%; padding: 10px; font-weight: 700; font-size: 12px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s ease; }
    .btn-main { background: #3b82f6; color: #ffffff; box-shadow: 0 2px 4px rgba(59,130,246,0.3); }
    .btn-main:hover { background: #2563eb; }
    .btn-main.is-studying { background: #10b981; box-shadow: 0 2px 4px rgba(16,185,129,0.3); }
    .btn-main.is-studying:hover { background: #059669; }
    .btn-focus { background: #334155; color: #cbd5e1; border: 1px solid #475569; margin-top: 8px; }
    .btn-focus:hover { background: #475569; }
    .btn-focus.active { background: #f97316; color: white; border-color: #ea580c; box-shadow: 0 2px 4px rgba(249,115,22,0.3); }
    .settings { display: flex; align-items: center; justify-content: space-between; font-size: 11px; margin-top: 10px; color: #94a3b8; padding-top: 8px; border-top: 1px solid #334155; }
    .settings input { width: 48px; padding: 4px; text-align: center; background: #0f172a; border: 1px solid #475569; border-radius: 6px; font-weight: 700; color: #f8fafc; }
    .settings input:focus { border-color: #38bdf8; outline: none; }
    .grid-head { font-size: 11px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .box { width: 100%; aspect-ratio: 1; background: #334155; border-radius: 3px; position: relative; transition: transform 0.1s; }
    .box:hover { transform: scale(1.15); z-index: 10; }
    .box:hover::after { content: attr(data-tip); position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: #0f172a; color: #f8fafc; padding: 5px 7px; font-size: 9px; border-radius: 6px; white-space: nowrap; border: 1px solid #475569; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
    .l0 { background: #334155; }
    .l1 { background: #065f46; }
    .l2 { font-weight: bold; background: #047857; }
    .l3 { background: #10b981; }
    .l4 { background: #34d399; }
    .system-btn { background: none; border: none; color: #64748b; font-size: 10px; text-decoration: underline; margin-top: 10px; text-align: center; cursor: pointer; display: block; width: 100%; }
    .system-btn:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="header-panel">
    <h3 class="title">MATRIX ENGINE</h3>
    <span id="modeBadge" class="badge study">Study Mode</span>
  </div>

  <div class="card">
    <div class="label">Normal YT Allowance</div>
    <div id="normalClock" class="value red-t">20:00</div>
    <button id="modeToggle" class="btn-main">Switch Mode</button>
    <div class="settings">
      <span>Daily Budget Target:</span>
      <div>
        <input type="number" id="budgetInput" min="1" max="120" value="20">
        <span style="font-weight:600; margin-left:2px; color:#64748b;">m</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="label">Productivity Logs (Today)</div>
    <div style="display:flex; justify-content:space-between; margin: 8px 0 12px 0;">
      <div>
        <div style="font-size:9px; color:#64748b; font-weight:600; letter-spacing:0.3px;">LECTURES / DPP</div>
        <div id="lecStat" class="green-t" style="font-weight:800; font-size:16px; margin-top:2px;">0h 0m</div>
      </div>
      <div style="text-align: right;">
        <div style="font-size:9px; color:#64748b; font-weight:600; letter-spacing:0.3px;">SELF STUDY</div>
        <div id="selfStat" style="font-weight:800; font-size:16px; color:#f97316; margin-top:2px;">0h 0m</div>
      </div>
    </div>
    <button id="focusToggle" class="btn-focus">🧘 Start Focus Session</button>
  </div>

  <div class="card">
    <div class="grid-head">Consistency Metrics</div>
    <div id="mapGrid" class="heatmap"></div>
    <button id="resetBrainBtn" class="system-btn">Wipe Neural Training Records</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
